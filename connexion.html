<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion - QOYA</title>


<style>

:root{

--cream:#F8F3EA;
--brown:#5A3828;
--sage:#A8B89A;

}


*{

margin:0;
padding:0;
box-sizing:border-box;

}



body{

font-family:Arial,sans-serif;

background:var(--cream);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}




.box{

background:white;

width:380px;

padding:40px;

border-radius:30px;

}




.logo{

text-align:center;

margin-bottom:25px;

}



.logo img{

width:140px;

}




h1{

text-align:center;

color:var(--brown);

margin-bottom:25px;

}




input{

width:100%;

padding:14px;

margin-bottom:15px;

border-radius:15px;

border:1px solid #ddd;

}




button{

width:100%;

padding:15px;

border:none;

border-radius:25px;

background:var(--sage);

color:white;

font-size:16px;

cursor:pointer;

}



.message{

text-align:center;

margin-top:15px;

font-size:14px;

}




a{

color:var(--brown);

}



</style>


</head>


<body>



<div class="box">


<div class="logo">

<img src="logos.png" alt="QOYA">

</div>



<h1>
Connexion
</h1>




<input 
id="email"
type="email"
placeholder="Adresse mail">



<input 
id="password"
type="password"
placeholder="Mot de passe">





<button onclick="connexion()">

Se connecter

</button>



<div class="message" id="message"></div>



<p style="text-align:center;margin-top:20px">

Pas encore de compte ?

<a href="inscription.html">
Créer un compte
</a>

</p>



</div>






<script>


function connexion(){


let email=document.getElementById("email").value;

let password=document.getElementById("password").value;



let compte=localStorage.getItem("qoyaUtilisateur");



if(!compte){

document.getElementById("message").innerHTML=
"Aucun compte trouvé";

return;

}



compte=JSON.parse(compte);





if(
email===compte.email &&
password===compte.password
){


localStorage.setItem(
"qoyaSession",
JSON.stringify(compte)
);



document.getElementById("message").innerHTML=
"Connexion réussie";



setTimeout(()=>{

window.location.href="dashboard.html";

},1000);



}

else{


document.getElementById("message").innerHTML=
"Email ou mot de passe incorrect";


}



}



</script>


</body>

</html>
