<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer un compte - QOYA</title>


<style>

:root{
--cream:#F8F3EA;
--brown:#5A3828;
--sage:#A8B89A;
}


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:Arial,sans-serif;
background:var(--cream);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}



.box{

background:white;

width:380px;

padding:40px;

border-radius:30px;

}



.logo{

text-align:center;
margin-bottom:25px;

}



.logo img{

width:140px;

}



h1{

color:var(--brown);
text-align:center;
margin-bottom:20px;

}



input{

width:100%;

padding:14px;

margin-bottom:15px;

border-radius:15px;

border:1px solid #ddd;

}



button{

width:100%;

padding:15px;

border:none;

border-radius:25px;

background:var(--sage);

color:white;

cursor:pointer;

font-size:16px;

}



.message{

text-align:center;

margin-top:15px;

font-size:14px;

}



a{

color:var(--brown);

}


</style>

</head>



<body>



<div class="box">


<div class="logo">

<img src="logos.png" alt="QOYA">

</div>



<h1>
Créer un compte
</h1>




<input id="prenom" placeholder="Prénom">



<input id="email" type="email" placeholder="Adresse mail">



<input id="password" type="password" placeholder="Mot de passe">




<button onclick="creerCompte()">

Créer mon compte

</button>




<div class="message" id="message"></div>





<p style="text-align:center;margin-top:20px">

Déjà un compte ?

<a href="connexion.html">
Connexion
</a>


</p>



</div>







<script>


function creerCompte(){



let prenom =
document.getElementById("prenom").value.trim();



let email =
document.getElementById("email").value.trim();



let password =
document.getElementById("password").value.trim();





if(prenom=="" || email=="" || password==""){


document.getElementById("message").innerHTML =
"Veuillez remplir tous les champs";


return;


}






// Vérifie si un compte existe déjà


let ancienCompte =
localStorage.getItem("qoyaUser");



if(ancienCompte){


document.getElementById("message").innerHTML =
"Un compte existe déjà sur cet appareil";


return;


}






let utilisateur = {


prenom:prenom,

email:email,

password:password,

dateCreation:new Date().toISOString()


};







// création du compte


localStorage.setItem(

"qoyaUser",

JSON.stringify(utilisateur)

);






// connexion automatique


localStorage.setItem(

"qoyaConnecte",

"oui"

);







document.getElementById("message").innerHTML =

"Bienvenue sur QOYA 🐱";







setTimeout(()=>{


window.location.href="mon-chat.html";


},1000);





}




</script>



</body>

</html>
