<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mon chat - QOYA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>


<style>

:root{

--cream:#F8F3EA;
--brown:#5A3828;
--sage:#A8B89A;
--text:#3A2A22;

}


*{

margin:0;
padding:0;
box-sizing:border-box;

}


body{

font-family:"Inter",sans-serif;
background:var(--cream);
color:var(--text);

}



/* HEADER */


header{

display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;

}


.logo img{

width:140px;

}


.back{

text-decoration:none;
color:var(--brown);
background:white;
padding:12px 25px;
border-radius:25px;

}




/* PAGE */


main{

padding:40px 70px;

}


.title{

margin-bottom:40px;

}


.title h1{

font-size:40px;
color:var(--brown);

}


.title p{

color:#756960;
margin-top:10px;

}




/* FORMULAIRE */


.profile-card{

background:white;
border-radius:30px;
padding:40px;
max-width:800px;

}



.icon{

text-align:center;
margin-bottom:30px;

}


.icon svg{

width:70px;
height:70px;
color:var(--sage);

}




.form-grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:25px;

}



.field{

display:flex;
flex-direction:column;

}


label{

font-size:14px;
margin-bottom:8px;

}


input,
select,
textarea{

padding:15px;

border-radius:15px;

border:1px solid #E6DDD2;

font-size:15px;

font-family:inherit;

}



textarea{

resize:none;
height:120px;

}




.full{

grid-column:1 / 3;

}




button{

margin-top:30px;

background:var(--sage);

color:white;

border:none;

padding:16px 35px;

border-radius:30px;

font-size:16px;

cursor:pointer;

}



button:hover{

opacity:0.85;

}




@media(max-width:700px){

header{

padding:20px;

}


main{

padding:30px 20px;

}


.form-grid{

grid-template-columns:1fr;

}


.full{

grid-column:auto;

}

}


</style>

</head>



<body>



<header>


<div class="logo">

<img src="logo-qoya.png" alt="Logo QOYA">

</div>


<a class="back" href="dashboard.html">

Tableau de bord

</a>


</header>




<main>



<section class="title">


<h1>
Mon chat
</h1>


<p>
Créez la fiche personnalisée de votre compagnon.
</p>


</section>





<section class="profile-card">


<div class="icon">

<i data-lucide="cat"></i>

</div>



<form>


<div class="form-grid">



<div class="field">

<label>
Nom
</label>

<input type="text" placeholder="Nom du chat">

</div>




<div class="field">

<label>
Date de naissance
</label>

<input type="date">

</div>





<div class="field">

<label>
Sexe
</label>

<select>

<option>Choisir</option>
<option>Mâle</option>
<option>Femelle</option>

</select>

</div>





<div class="field">

<label>
Race
</label>

<input type="text" placeholder="Race">

</div>





<div class="field">

<label>
Poids
</label>

<input type="number" placeholder="kg">

</div>





<div class="field">

<label>
Stérilisé(e)
</label>

<select>

<option>Choisir</option>
<option>Oui</option>
<option>Non</option>

</select>

</div>





<div class="field full">

<label>
Alimentation actuelle
</label>

<input type="text" placeholder="Croquettes, pâtée...">

</div>





<div class="field full">

<label>
Notes importantes
</label>

<textarea placeholder="Informations particulières..."></textarea>

</div>



</div>



<button>
Enregistrer
</button>



</form>



</section>



</main>




<script>

lucide.createIcons();

</script>


</body>

</html>
