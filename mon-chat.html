<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon chat - QOYA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #F8F3EA;
      --brown: #5A3828;
      --sage: #A8B89A;
      --text: #3A2A22;
      --white: #FFFFFF;
      --soft: #EFE7DC;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--cream);
      color: var(--text);
      padding: 30px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo img {
      width: 140px;
    }

    .back {
      text-decoration: none;
      background: white;
      color: var(--brown);
      padding: 12px 25px;
      border-radius: 25px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 30px;
    }

    h1, h2 {
      color: var(--brown);
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 15px;
      border: 1px solid #ddd;
      font-size: 15px;
    }

    button {
      margin-top: 25px;
      background: var(--sage);
      color: white;
      border: none;
      padding: 15px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: .85;
    }

    /* CROISEMENT */
    #zoneCroise {
      display: none;
      background: var(--cream);
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
    }

    .races {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .races label {
      background: white;
      padding: 10px;
      border-radius: 15px;
      font-size: 14px;
    }

    .races input {
      width: auto;
    }

    /* RESUME */
    .info {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--soft);
    }

    .info:last-child {
      border: none;
    }

    .weight {
      background: var(--cream);
      padding: 15px;
      border-radius: 15px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    .message {
      text-align: center;
      margin-top: 15px;
      color: var(--brown);
    }

    @media(max-width: 700px) {
      body {
        padding: 20px;
      }

      .races {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <img src="logos.png" alt="QOYA">
    </div>
    <a class="back" href="dashboard.html">Tableau de bord</a>
  </header>

  <div class="container">

    <section class="card">
      <h1>Mon chat</h1>

      <label>Nom du chat</label>
      <input id="nom" placeholder="Ex : Luna">

      <label>Date de naissance</label>
      <input id="naissance" type="date">

      <label>Sexe</label>
      <select id="sexe">
        <option>Mâle</option>
        <option>Femelle</option>
      </select>

      <label>Race principale</label>
      <select id="race" onchange="afficherCroise()">
        <option value="">Choisir une race</option>
        <option>Abyssin</option>
        <option>American Curl</option>
        <option>American Shorthair</option>
        <option>Angora Turc</option>
        <option>Balinais</option>
        <option>Bengal</option>
        <option>Birman</option>
        <option>Bleu Russe</option>
        <option>Bombay</option>
        <option>Bobtail Japonais</option>
        <option>British Shorthair</option>
        <option>Burmese</option>
        <option>Chartreux</option>
        <option>Chausie</option>
        <option>Cornish Rex</option>
        <option>Devon Rex</option>
        <option>Egyptian Mau</option>
        <option>Européen</option>
        <option>Exotic Shorthair</option>
        <option>Havana Brown</option>
        <option>Khao Manee</option>
        <option>Korat</option>
        <option>LaPerm</option>
        <option>Maine Coon</option>
        <option>Manx</option>
        <option>Munchkin</option>
        <option>Nebelung</option>
        <option>Norvégien</option>
        <option>Ocicat</option>
        <option>Oriental</option>
        <option>Persan</option>
        <option>Peterbald</option>
        <option>Pixiebob</option>
        <option>Ragdoll</option>
        <option>Ragamuffin</option>
        <option>Sacré de Birmanie</option>
        <option>Savannah</option>
        <option>Scottish Fold</option>
        <option>Selkirk Rex</option>
        <option>Siamois</option>
        <option>Sibérien</option>
        <option>Singapura</option>
        <option>Sphynx</option>
        <option>Thai</option>
        <option>Toyger</option>
        <option>Turkish Van</option>
        <option value="Croisé">Croisé</option>
        <option value="Autre">Autre</option>
      </select>

      <div id="zoneCroise">
        <h3>Races du croisement</h3>
        <div class="races" id="listeCroise"></div>
      </div>

      <label>Stérilisé</label>
      <select id="sterilise">
        <option>Non</option>
        <option>Oui</option>
      </select>

      <label>Poids actuel (kg)</label>
      <input id="poids" type="number" step="0.01">

      <button onclick="enregistrerChat()">Enregistrer</button>

      <div class="message" id="message"></div>
    </section>

    <section class="card">
      <h2>Résumé</h2>

      <div class="info">
        <span>Nom</span>
        <strong id="rNom">-</strong>
      </div>

      <div class="info">
        <span>Âge</span>
        <strong id="rAge">-</strong>
      </div>

      <div class="info">
        <span>Race</span>
        <strong id="rRace">-</strong>
      </div>

      <div class="info">
        <span>Poids</span>
        <strong id="rPoids">-</strong>
      </div>

      <div id="historiquePoids"></div>
    </section>

  </div>

  <script>
    // Toutes les races disponibles pour les croisements
    const racesDisponibles = [
      "Abyssin", "American Curl", "American Shorthair", "Angora Turc", "Balinais",
      "Bengal", "Birman", "Bleu Russe", "Bombay", "Bobtail Japonais",
      "British Shorthair", "Burmese", "Chartreux", "Chausie", "Cornish Rex",
      "Devon Rex", "Egyptian Mau", "Européen", "Exotic Shorthair", "Havana Brown",
      "Khao Manee", "Korat", "LaPerm", "Maine Coon", "Manx", "Munchkin",
      "Nebelung", "Norvégien", "Ocicat", "Oriental", "Persan", "Peterbald",
      "Pixiebob", "Ragdoll", "Ragamuffin", "Sacré de Birmanie", "Savannah",
      "Scottish Fold", "Selkirk Rex", "Siamois", "Sibérien", "Singapura",
      "Sphynx", "Thai", "Toyger", "Turkish Van"
    ];

    // Récupération des données existantes
    let chat = JSON.parse(localStorage.getItem("qoyaChat")) || {
      nom: "",
      naissance: "",
      sexe: "Mâle",
      race: "",
      croisement: [],
      sterilise: "Non",
      poids: "",
      historiquePoids: []
    };

    // Afficher la zone croisé
    function afficherCroise() {
      let raceChoisie = document.getElementById("race").value;
      let zone = document.getElementById("zoneCroise");
      let liste = document.getElementById("listeCroise");

      liste.innerHTML = "";

      if (raceChoisie === "Croisé") {
        zone.style.display = "block";

        racesDisponibles.forEach(race => {
          liste.innerHTML += `
            <label>
              <input type="checkbox" value="${race}" class="raceCroisee">
              ${race}
            </label>
          `;
        });
      } else {
        zone.style.display = "none";
      }
    }

    // Enregistrer le profil
    function enregistrerChat() {
      chat.nom = document.getElementById("nom").value;
      chat.naissance = document.getElementById("naissance").value;
      chat.sexe = document.getElementById("sexe").value;
      chat.race = document.getElementById("race").value;
      chat.sterilise = document.getElementById("sterilise").value;
      chat.poids = document.getElementById("poids").value;

      // Récupération des races croisées
      chat.croisement = [];
      document.querySelectorAll(".raceCroisee:checked").forEach(r => {
        chat.croisement.push(r.value);
      });

      // Ajout automatique dans l'historique poids
      if (chat.poids) {
        let aujourd = new Date().toLocaleDateString("fr-FR");
        let dernier = chat.historiquePoids[chat.historiquePoids.length - 1];

        if (!dernier || dernier.poids != chat.poids) {
          chat.historiquePoids.push({
            date: aujourd,
            poids: chat.poids
          });
        }
      }

      localStorage.setItem("qoyaChat", JSON.stringify(chat));

      document.getElementById("message").innerHTML = "Profil du chat enregistré ✓";

      afficherResume();
    }

    // Charger les informations
    function chargerChat() {
      document.getElementById("nom").value = chat.nom || "";
      document.getElementById("naissance").value = chat.naissance || "";
      document.getElementById("sexe").value = chat.sexe || "Mâle";
      document.getElementById("race").value = chat.race || "";
      document.getElementById("sterilise").value = chat.sterilise || "Non";
      document.getElementById("poids").value = chat.poids || "";

      if (chat.race === "Croisé") {
        afficherCroise();

        setTimeout(() => {
          document.querySelectorAll(".raceCroisee").forEach(cb => {
            if (chat.croisement.includes(cb.value)) {
              cb.checked = true;
            }
          });
        }, 100);
      }

      afficherResume();
    }

    // Calcul âge
    function calculAge() {
      if (!chat.naissance) {
        return "-";
      }

      let naissance = new Date(chat.naissance);
      let maintenant = new Date();

      let mois = (maintenant.getFullYear() - naissance.getFullYear()) * 12 +
                 (maintenant.getMonth() - naissance.getMonth());

      if (mois < 12) {
        return mois + " mois";
      } else {
        return Math.floor(mois / 12) + " ans";
      }
    }

    // Afficher résumé
    function afficherResume() {
      document.getElementById("rNom").innerHTML = chat.nom || "-";
      document.getElementById("rAge").innerHTML = calculAge();

      let raceAffiche = chat.race || "-";

      if (chat.race === "Croisé" && chat.croisement.length) {
        raceAffiche += " (" + chat.croisement.join(" × ") + ")";
      }

      document.getElementById("rRace").innerHTML = raceAffiche;

      document.getElementById("rPoids").innerHTML = chat.poids ? chat.poids + " kg" : "-";

      let zone = document.getElementById("historiquePoids");
      zone.innerHTML = "";

      if (chat.historiquePoids.length) {
        zone.innerHTML += "<h3 style='margin-top:25px;color:#5A3828'>Historique poids</h3>";

        chat.historiquePoids.forEach(p => {
          zone.innerHTML += `
            <div class="weight">
              <span>${p.date}</span>
              <strong>${p.poids} kg</strong>
            </div>
          `;
        });
      }
    }

    chargerChat();
  </script>

</body>
</html>
