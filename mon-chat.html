<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mon chat - QOYA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --cream:#F8F3EA;
  --brown:#5A3828;
  --sage:#A8B89A;
  --text:#3A2A22;
  --white:#FFFFFF;
  --soft:#EFE7DC;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Inter",sans-serif;
  background:var(--cream);
  color:var(--text);
  padding:30px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
}

.logo img{
  width:140px;
}

.back{
  text-decoration:none;
  background:white;
  color:var(--brown);
  padding:12px 25px;
  border-radius:25px;
}

.container{
  max-width:1000px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.card{
  background:white;
  padding:35px;
  border-radius:30px;
}

h1,h2{
  color:var(--brown);
  margin-bottom:25px;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:8px;
  font-weight:500;
}

input,select{
  width:100%;
  padding:14px;
  border-radius:15px;
  border:1px solid #ddd;
  font-size:15px;
}

.photo-zone{
  text-align:center;
  margin-bottom:20px;
}

.photo-zone img{
  width:130px;
  height:130px;
  object-fit:cover;
  border-radius:50%;
  display:none;
  margin:auto;
}

button{
  margin-top:25px;
  width:100%;
  padding:15px;
  border:0;
  border-radius:25px;
  background:var(--sage);
  color:white;
  cursor:pointer;
  font-size:16px;
}

#zoneCroisement{
  display:none;
  background:var(--cream);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

.races{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.races label{
  background:white;
  padding:10px;
  border-radius:15px;
}

.races input{
  width:auto;
}

.resume p{
  padding:12px 0;
  border-bottom:1px solid var(--soft);
}

.resume strong{
  color:var(--brown);
}

.message{
  text-align:center;
  margin-top:15px;
}

@media(max-width:800px){
  .container{
    grid-template-columns:1fr;
  }
}

</style>

</head>

<body>

<header>
  <div class="logo">
    <img src="logos.png" alt="QOYA">
  </div>
  <a class="back" href="dashboard.html">
    Tableau de bord
  </a>
</header>

<div class="container">

  <section class="card">
    <h1>Mon chat</h1>

    <div class="photo-zone">
      <img id="photoChat">
      <input type="file" id="photo" accept="image/*" onchange="chargerPhoto()">
    </div>

    <label>Prénom</label>
    <input id="prenom" placeholder="Ex : Luna">

    <label>Date de naissance</label>
    <input id="naissance" type="date">

    <label>Sexe</label>
    <select id="sexe">
      <option>Mâle</option>
      <option>Femelle</option>
    </select>

    <label>Race principale</label>
    <select id="race" onchange="gestionCroisement()">
      <option value="">Choisir une race</option>
      <option>Abyssin</option>
      <option>American Curl</option>
      <option>American Shorthair</option>
      <option>Angora Turc</option>
      <option>Balinais</option>
      <option>Bengal</option>
      <option>Birman</option>
      <option>Bleu Russe</option>
      <option>Bombay</option>
      <option>British Shorthair</option>
      <option>Burmese</option>
      <option>Chartreux</option>
      <option>Cornish Rex</option>
      <option>Devon Rex</option>
      <option>Egyptian Mau</option>
      <option>Européen</option>
      <option>Exotic Shorthair</option>
      <option>Maine Coon</option>
      <option>Norvégien</option>
      <option>Persan</option>
      <option>Ragdoll</option>
      <option>Sacré de Birmanie</option>
      <option>Savannah</option>
      <option>Scottish Fold</option>
      <option>Siamois</option>
      <option>Sphynx</option>
      <option>Toyger</option>
      <option value="Croisé">Croisé</option>
      <option value="Autre">Autre</option>
    </select>

    <div id="zoneCroisement">
      <h3>Races du croisement</h3>
      <div class="races" id="listeRaces"></div>
    </div>

    <label>Stérilisé</label>
    <select id="sterilise">
      <option>Non</option>
      <option>Oui</option>
    </select>

    <label>Marque de croquettes actuelle</label>
    <input id="croquettes" placeholder="Ex : Royal Canin">

    <label>Pâtée</label>
    <select id="patee">
      <option>Non</option>
      <option>Oui</option>
    </select>

    <label>Terrine</label>
    <select id="terrine">
      <option>Non</option>
      <option>Oui</option>
    </select>

    <button onclick="enregistrerChat()">Enregistrer mon chat</button>

    <div class="message" id="message"></div>
  </section>

  <section class="card resume">
    <h2>Résumé</h2>

    <p>Prénom : <strong id="rPrenom">-</strong></p>
    <p>Âge : <strong id="rAge">-</strong></p>
    <p>Sexe : <strong id="rSexe">-</strong></p>
    <p>Race : <strong id="rRace">-</strong></p>
    <p>Croisement : <strong id="rCroisement">Aucun croisement</strong></p>
    <p>Stérilisé : <strong id="rSterilise">-</strong></p>
    <p>Croquettes : <strong id="rCroquettes">-</strong></p>
    <p>Pâtée : <strong id="rPatee">-</strong></p>
    <p>Terrine : <strong id="rTerrine">-</strong></p>
  </section>

</div>

<script>

const races = [
  "Abyssin",
  "American Curl",
  "American Shorthair",
  "Angora Turc",
  "Balinais",
  "Bengal",
  "Birman",
  "Bleu Russe",
  "Bombay",
  "British Shorthair",
  "Burmese",
  "Chartreux",
  "Cornish Rex",
  "Devon Rex",
  "Egyptian Mau",
  "Européen",
  "Exotic Shorthair",
  "Maine Coon",
  "Norvégien",
  "Persan",
  "Ragdoll",
  "Sacré de Birmanie",
  "Savannah",
  "Scottish Fold",
  "Siamois",
  "Sphynx",
  "Toyger"
];

let chat = JSON.parse(
  localStorage.getItem("qoyaChat")
) || {
  photo:"",
  prenom:"",
  naissance:"",
  sexe:"",
  race:"",
  croisement:[],
  sterilise:"",
  croquettes:"",
  patee:"Non",
  terrine:"Non"
};

// PHOTO
function chargerPhoto(){
  let fichier = document.getElementById("photo").files[0];
  if(!fichier){
    return;
  }

  let lecteur = new FileReader();

  lecteur.onload=function(e){
    chat.photo=e.target.result;
    document.getElementById("photoChat").src=e.target.result;
    document.getElementById("photoChat").style.display="block";
  }

  lecteur.readAsDataURL(fichier);
}

// CROISEMENT
function gestionCroisement(){
  let choix = document.getElementById("race").value;
  let zone = document.getElementById("zoneCroisement");
  let liste = document.getElementById("listeRaces");

  liste.innerHTML="";

  if(choix==="Croisé"){
    zone.style.display="block";

    races.forEach(race=>{
      liste.innerHTML += `
        <label>
          <input type="checkbox" class="raceChoisie" value="${race}">
          ${race}
        </label>
      `;
    });
  } else {
    zone.style.display="none";
  }
}

// ENREGISTREMENT
function enregistrerChat(){
  chat.prenom = document.getElementById("prenom").value;
  chat.naissance = document.getElementById("naissance").value;
  chat.sexe = document.getElementById("sexe").value;
  chat.race = document.getElementById("race").value;
  chat.sterilise = document.getElementById("sterilise").value;
  chat.croquettes = document.getElementById("croquettes").value;
  chat.patee = document.getElementById("patee").value;
  chat.terrine = document.getElementById("terrine").value;

  chat.croisement=[];

  document.querySelectorAll(".raceChoisie:checked").forEach(r=>{
    chat.croisement.push(r.value);
  });

  localStorage.setItem("qoyaChat", JSON.stringify(chat));

  afficherResume();

  document.getElementById("message").innerHTML = "Profil enregistré ✓";
}

// CALCUL AGE
function calculAge(){
  if(!chat.naissance){
    return "-";
  }

  let naissance = new Date(chat.naissance);
  let aujourd = new Date();

  let mois = (aujourd.getFullYear() - naissance.getFullYear())*12 + (aujourd.getMonth() - naissance.getMonth());

  if(mois < 12){
    return mois+" mois";
  }

  return Math.floor(mois/12)+" ans";
}

// RESUME
function afficherResume(){
  document.getElementById("rPrenom").innerHTML = chat.prenom || "-";
  document.getElementById("rAge").innerHTML = calculAge();
  document.getElementById("rSexe").innerHTML = chat.sexe || "-";
  document.getElementById("rRace").innerHTML = chat.race || "-";

  if(chat.race==="Croisé" && chat.croisement.length){
    document.getElementById("rCroisement").innerHTML = chat.croisement.join(" × ");
  } else {
    document.getElementById("rCroisement").innerHTML = "Aucun croisement";
  }

  document.getElementById("rSterilise").innerHTML = chat.sterilise || "-";
  document.getElementById("rCroquettes").innerHTML = chat.croquettes || "-";
  document.getElementById("rPatee").innerHTML = chat.patee;
  document.getElementById("rTerrine").innerHTML = chat.terrine;

  if(chat.photo){
    document.getElementById("photoChat").src = chat.photo;
    document.getElementById("photoChat").style.display = "block";
  }
}

// CHARGEMENT AUTOMATIQUE
function chargerChat(){
  prenom.value = chat.prenom;
  naissance.value = chat.naissance;
  sexe.value = chat.sexe;
  race.value = chat.race;
  sterilise.value = chat.sterilise;
  croquettes.value = chat.croquettes;
  patee.value = chat.patee;
  terrine.value = chat.terrine;

  if(chat.race==="Croisé"){
    gestionCroisement();

    setTimeout(()=>{
      document.querySelectorAll(".raceChoisie").forEach(c=>{
        if(chat.croisement.includes(c.value)){
          c.checked=true;
        }
      });
    },100);
  }

  afficherResume();
}

chargerChat();

</script>

</body>

</html>
