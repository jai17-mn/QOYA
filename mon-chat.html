<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mon chat - QOYA</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>

:root{--cream:#F8F3EA;--brown:#5A3828;--sage:#A8B89A;--text:#3A2A22;--white:#FFFFFF;--soft:#EFE7DC;

}*{

margin:0;
padding:0;
box-sizing:border-box;

}body{

font-family:"Inter",sans-serif;
background:var(--cream);
color:var(--text);
padding:30px;

}header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;

}



.logo img{

width:140px;

}



.back{

text-decoration:none;
background:white;
color:var(--brown);
padding:12px 25px;
border-radius:25px;

}




.container{

max-width:1100px;
margin:auto;

}



.card{

background:white;
padding:35px;
border-radius:30px;
margin-bottom:25px;

}h1,h2{

color:var(--brown);
margin-bottom:25px;

}/* LISTE DES CHATS */


.chat-list{

display:flex;
gap:15px;
flex-wrap:wrap;

}



.chat-item{

background:var(--cream);

padding:15px 25px;

border-radius:25px;

cursor:pointer;

color:var(--brown);

}



.chat-item.active{

background:var(--sage);

color:white;

}




.add-chat{

background:white;

border:2px dashed var(--sage);

padding:15px 25px;

border-radius:25px;

cursor:pointer;

color:var(--brown);

}/* FORMULAIRE */label{

display:block;

margin-top:15px;

margin-bottom:8px;

font-weight:500;

}input,select{

width:100%;

padding:14px;

border-radius:15px;

border:1px solid #ddd;

font-size:15px;

}




.photo-zone{

text-align:center;

}



.photo-zone img{

width:130px;

height:130px;

border-radius:50%;

object-fit:cover;

display:none;

margin:auto;

}button{

margin-top:25px;

width:100%;

padding:15px;

border:none;

border-radius:25px;

background:var(--sage);

color:white;

cursor:pointer;

font-size:16px;

}




.resume p{

padding:12px 0;

border-bottom:1px solid var(--soft);

}



.resume strong{

color:var(--brown);

}#zoneCroisement{

display:none;

background:var(--cream);

padding:20px;

border-radius:20px;

margin-top:20px;

}



.races{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}



.races label{

background:white;

padding:10px;

border-radius:15px;

}



.races input{

width:auto;

}@media(max-width:800px){body{

padding:20px;

}


}</style></head><body><header><div class="logo"><img src="logos.png" alt="QOYA"></div><a class="back" href="dashboard.html">
Tableau de bord</a></header><div class="container"><section class="card"><h1>
Mes chats 🐱</h1><div class="chat-list" id="listeChats"><button class="add-chat" onclick="nouveauChat()">

+ Ajouter un chat</button></div></section><section class="card"><h2>
Informations du chat</h2><div class="photo-zone"><img id="photoChat"><input type="file"id="photo"accept="image/*"onchange="chargerPhoto()"></div><label>
Prénom</label><input id="prenom" placeholder="Ex : Luna"><label>
Date de naissance</label><input id="naissance" type="date"><label>
Sexe</label><select id="sexe"><option>Mâle</option><option>Femelle</option></select><label>
Race principale</label><select id="race" onchange="gestionCroisement()"><option value="">
Choisir une race</option></select><div id="zoneCroisement"><h3>
Races du croisement</h3><div class="races" id="listeRaces"></div></div><label>
Stérilisé</label><select id="sterilise"><option value="Non">Non</option><option value="Oui">Oui</option></select><label>
Poids actuel (facultatif)</label><input id="poids"placeholder="Ex : 3,5 kg"><h2 style="margin-top:35px;">
🍽️ Alimentation</h2><label>
Type d'alimentation</label><select id="typeAlimentation"><option>
Croquettes uniquement</option><option>
Croquettes + pâtée</option><option>
Croquettes + terrine</option><option>
Pâtée uniquement</option><option>
Alimentation mixte</option></select><label>
Marque de croquettes actuelle</label><input id="croquettes"placeholder="Rechercher une marque"><label>
Gamme de croquettes</label><input id="gamme"placeholder="Ex : Kitten, Sterilised, Adult..."><label>
Pâtée</label><select id="patee"><option value="Non">
Non</option><option value="Oui">
Oui</option></select><label>
Terrine</label><select id="terrine"><option value="Non">
Non</option><option value="Oui">
Oui</option></select><button onclick="enregistrerChat()">

Enregistrer mon chat</button><div id="message"></div></section><section class="card resume"><h2>
Résumé</h2><p>
Prénom :<strong id="rPrenom">-</strong></p><p>
Âge :<strong id="rAge">-</strong></p><p>
Sexe :<strong id="rSexe">-</strong></p><p>
Race :<strong id="rRace">-</strong></p><p>
Croisement :<strong id="rCroisement">
Aucun</strong></p><p>
Stérilisé :<strong id="rSterilise">
-</strong></p><p>
Poids :<strong id="rPoids">
-</strong></p><p>
Croquettes :<strong id="rCroquettes">
-</strong></p><p>
Gamme :<strong id="rGamme">
-</strong></p><p>
Pâtée :<strong id="rPatee">
-</strong></p><p>
Terrine :<strong id="rTerrine">
-</strong></p></section></div><script>const races = ["Abyssin","American Curl","American Shorthair","Angora Turc","Balinais","Bengal","Birman","Bleu Russe","Bombay","British Shorthair","Burmese","Chartreux","Cornish Rex","Devon Rex","Egyptian Mau","Européen","Exotic Shorthair","Maine Coon","Norvégien","Persan","Ragdoll","Sacré de Birmanie","Savannah","Scottish Fold","Siamois","Sphynx","Toyger"

];let chats = JSON.parse(localStorage.getItem("qoyaChats")
) || [];let chatActuel = null;let photoTemp = "";// créer nouveau chatfunction nouveauChat(){chatActuel = {

photo:"",
prenom:"",
naissance:"",
sexe:"Mâle",
race:"",
croisement:[],
sterilise:"Non",
poids:"",
typeAlimentation:"Croquettes uniquement",
croquettes:"",
gamme:"",
patee:"Non",
terrine:"Non"

};viderFormulaire();afficherChats();


}// afficher liste chatsfunction afficherChats(){let liste =document.getElementById("listeChats");liste.innerHTML="";chats.forEach((chat,index)=>{let bouton=document.createElement("button");bouton.className="chat-item";bouton.innerHTML =chat.prenom || "Chat "+(index+1);bouton.onclick=()=>{chatActuel=chat;chargerFormulaire();


};liste.appendChild(bouton);



});let ajout=document.createElement("button");ajout.className="add-chat";ajout.innerHTML="+ Ajouter un chat";ajout.onclick=nouveauChat;liste.appendChild(ajout);



}// remplir raceslet selectRace =document.getElementById("race");races.forEach(r=>{selectRace.innerHTML +=`
<option value="${r}">${r}
</option>
`;


});selectRace.innerHTML +=`
<option value="Croisé">
Croisé
</option>

<option value="Autre">
Autre
</option>
`;// croisementfunction gestionCroisement(){let zone =document.getElementById("zoneCroisement");let liste =document.getElementById("listeRaces");liste.innerHTML="";if(race.value==="Croisé"){zone.style.display="block";races.forEach(r=>{liste.innerHTML +=`

<label>

<input 
type="checkbox"
class="raceChoisie"
value="${r}">${r}

</label>

`;


});


}else{zone.style.display="none";


}


}// photofunction chargerPhoto(){let fichier =document.getElementById("photo").files[0];if(!fichier)return;let lecteur=new FileReader();lecteur.onload=function(e){photoTemp=e.target.result;photoChat.src=photoTemp;photoChat.style.display="block";


};lecteur.readAsDataURL(fichier);



}// enregistrerfunction enregistrerChat(){let nouveau = {


photo:photoTemp,


prenom:prenom.value,


naissance:naissance.value,


sexe:sexe.value,


race:race.value,


croisement:[],


sterilise:sterilise.value,


poids:poids.value,


typeAlimentation:typeAlimentation.value,


croquettes:croquettes.value,


gamme:gamme.value,


patee:patee.value,


terrine:terrine.value



};document.querySelectorAll(".raceChoisie:checked").forEach(r=>{nouveau.croisement.push(r.value);


});if(chatActuel && chats.includes(chatActuel)){let index=chats.indexOf(chatActuel);chats[index]=nouveau;


}else{chats.push(nouveau);


}localStorage.setItem("qoyaChats",JSON.stringify(chats)

);document.getElementById("message").innerHTML="Chat enregistré ✓";setTimeout(()=>{window.location.href="dashboard.html";


},1000);



}// âgefunction calculAge(date){if(!date)return "-";let naissance=new Date(date);let maintenant=new Date();let mois =

(maintenant.getFullYear()-naissance.getFullYear())*12+

(maintenant.getMonth()-naissance.getMonth());if(mois<12)return mois+" mois";return Math.floor(mois/12)+" ans";


}function chargerFormulaire(){prenom.value=chatActuel.prenom;naissance.value=chatActuel.naissance;sexe.value=chatActuel.sexe;race.value=chatActuel.race;sterilise.value=chatActuel.sterilise;poids.value=chatActuel.poids;typeAlimentation.value=chatActuel.typeAlimentation;croquettes.value=chatActuel.croquettes;gamme.value=chatActuel.gamme;patee.value=chatActuel.patee;terrine.value=chatActuel.terrine;afficherResume();



}function viderFormulaire(){document.querySelectorAll("input").forEach(i=>{if(i.type!=="file")i.value="";


});afficherResume();


}function afficherResume(){if(!chatActuel)return;rPrenom.innerHTML =chatActuel.prenom || "-";rAge.innerHTML =calculAge(chatActuel.naissance);rSexe.innerHTML =chatActuel.sexe;rRace.innerHTML =chatActuel.race || "-";rCroisement.innerHTML =chatActuel.croisement.length?chatActuel.croisement.join(" × "):"Aucun";rSterilise.innerHTML =chatActuel.sterilise;rPoids.innerHTML =chatActuel.poids || "-";rCroquettes.innerHTML =chatActuel.croquettes || "-";rGamme.innerHTML =chatActuel.gamme || "-";rPatee.innerHTML =chatActuel.patee;rTerrine.innerHTML =chatActuel.terrine;



}// démarrageafficherChats();if(chats.length===0){nouveauChat();


}</script></body></html>
